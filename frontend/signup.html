<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Smart Parking Digital Twin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-body">
    <header class="auth-header">
      <h1>Smart Parking Digital Twin</h1>
      <a href="login.html" class="link-button">Back to Login</a>
    </header>
    <main class="auth-container">
      <section class="auth-card">
        <h2>Create an account</h2>
        <p class="auth-subtitle">
          Sign up to manage your parking experience and save your preferences.
        </p>
        <form class="auth-form">
          <div class="field">
            <label for="name">Full name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your full name"
              required
            />
          </div>
          <div class="field">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>
          <div class="field">
            <label for="vehicle">Vehicle number (optional)</label>
            <input
              type="text"
              id="vehicle"
              name="vehicle"
              placeholder="e.g. AP09 AB 1234"
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create a strong password"
              required
              minlength="6"
            />
          </div>
          <div class="field">
            <label for="confirm-password">Confirm password</label>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Re-enter your password"
              required
              minlength="6"
            />
          </div>
          <button type="submit" class="primary-button full-width">
            Sign up
          </button>
          <p class="auth-footer-text">
            Already have an account?
            <a href="index.html">Go to dashboard</a>
          </p>
        </form>
      </section>
    </main>
    <script src="runtime-config.js"></script>
    <script>
      document.querySelector(".auth-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const API = window.__SPARK_CONFIG__?.API_V1 || "http://localhost:8000/api";
        const fullName = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const vehicle = document.getElementById("vehicle").value.trim();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm-password").value;

        if (!fullName || !email || !password || !confirm) {
          alert("Please fill in all required fields.");
          return;
        }

        if (password !== confirm) {
          alert("Passwords do not match. Please try again.");
          return;
        }

        try {
          const resp = await fetch(`${API}/users/signup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ full_name: fullName, email, password, phone: "", vehicle }),
          });

          if (resp.status === 201) {
            alert("Signup successful. Please login.");
            window.location.href = "login.html";
          } else {
            const error = await resp.json();
            alert(error.error || "Signup failed");
          }
        } catch (err) {
          alert("Signup failed: " + err.message);
        }
      });
    </script>
  </body>
</html>
